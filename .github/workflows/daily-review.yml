# daily-review.yml
# Runs every day at 09:00 UTC, generates the next casino review and deploys to FTP

name: Daily Casino Review

on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 09:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1 – Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2 – Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3 – Generate review (picks next unpublished casino)
      - name: Generate casino review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node src/generate-review.js

      # 4 – Rebuild index + sitemap
      - name: Rebuild site index
        run: node src/build-site.js

      # 5 – Commit updated data files back to repo
      - name: Commit changes
        run: |
          git config user.name  "AI Casinos Bot"
          git config user.email "bot@ai-casinos.review"
          git add data/ site/
          git diff --staged --quiet || git commit -m "🎰 Auto-publish: $(date -u +'%Y-%m-%d') casino review"
          git push

      # 6 – Deploy site folder to FTP
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:            ${{ secrets.FTP_HOST }}
          username:          ${{ secrets.FTP_USERNAME }}
          password:          ${{ secrets.FTP_PASSWORD }}
          local-dir:         ./site/
          server-dir:        /ai-casinos-discord/
          exclude:           |
            **/.git*
            **/node_modules/**
